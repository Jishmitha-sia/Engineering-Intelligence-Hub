[tool:pytest]
# Engineering Intelligence Hub - Backend Test Configuration

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test execution
addopts = 
    -v
    --strict-markers
    --strict-config
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=50
    --tb=short
    --disable-warnings

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests  
    slow: Slow tests (may take >1s)
    auth: Authentication tests
    database: Database tests
    ai: AI/ML tests
    documents: Document processing tests
    search: Search functionality tests
    chat: Chat/RAG tests
    github: GitHub integration tests
    evaluation: Evaluation system tests

# Test environment
env = 
    ENVIRONMENT = testing
    DATABASE_URL = postgresql+asyncpg://engineering_hub:engineering_hub@localhost:5432/engineering_hub
    JWT_SECRET_KEY = test-secret-key-for-testing-only-not-production-safe
    OLLAMA_BASE_URL = http://localhost:11434
    UPLOAD_DIR = ./test_uploads
    GITHUB_TEMP_DIR = ./test_tmp